server:
    port: 0

springdoc:
    api-docs:
        path: /ColaboradoresSucursales/api-docs
    
spring:
    application:
        name: ColaboradoresSucursales
    main:
        allow-bean-definition-overriding: true  
    flyway:
        enabled: 'true' 
        baseline-on-migrate: 'true'
    jpa:
        show-sql: 'true'
    profiles:
        active: dev

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

---

spring:
    config:
        activate:
            on-profile: dev
    datasource:
        username: root
        url: jdbc:mysql://localhost:3306/db_colab_suc_dev?createDatabaseIfNotExist=true
        driverClassName: com.mysql.cj.jdbc.Driver
        password: ''
    jpa:
        hibernate:
            ddl-auto: update

---

spring:
    config:
        activate:
            on-profile: test
    datasource:
        username: root
        url: jdbc:mysql://localhost:3306/db_colab_suc_test?createDatabaseIfNotExist=true
        driverClassName: com.mysql.cj.jdbc.Driver
        password: ''
    jpa:
        hibernate:
            ddl-auto: none

---

spring:
    config:
        activate:
            on-profile: prod
    datasource:
        username: root
        url: jdbc:mysql://localhost:3306/db_colab_suc_prod?createDatabaseIfNotExist=true
        driverClassName: com.mysql.cj.jdbc.Driver
        password: ''
    jpa:
        hibernate:
            ddl-auto: none    